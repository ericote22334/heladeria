<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Empleado</title>
<link rel="stylesheet" href="Estilos/agregar-empleados.css">  
</head>
<body>
  <h1>Gestión de Empleados</h1>
    <nav class="nav">
    <a href="personal.html">🔙 Volver al panel</a>
  </nav>
   <div class="card">
    <p class="card-title">Registrar nuevo empleado</p>
 
    <div class="form-group">
      <label for="username">Nombre de usuario</label>
      <input type="text" id="username" placeholder="ej: jlopez">
    </div>
 
    <div class="form-row">
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label for="confirm-pass">Confirmar contraseña</label>
        <input type="password" id="confirm-pass" placeholder="Repetir contraseña">
      </div>
    </div>
 
    <div class="form-group">
      <label for="rol">Rol</label>
      <select id="rol">
        <option value="" disabled selected>Seleccionar rol...</option>
        <option value="admin">Admin</option>
        <option value="empleado">Empleado</option>
      </select>
    </div>
 
    <div style="display: flex; gap: 10px; margin-top: 1.25rem;">
      <button class="btn btn-primary">Guardar empleado</button>
      <button class="btn btn-secondary">Cancelar</button>
    </div>
  </div>
 
</body>
</html>
