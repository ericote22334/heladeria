if (!isset($_SESSION['id_sucursal'])) {
    header("Location: seleccionar_sucursal.php");
    exit();
}

$id_sucursal = $_SESSION['id_sucursal'];

// AGREGAR PRODUCTO
if ($_SERVER["REQUEST_METHOD"] == "POST") {
    $nombre = $_POST['nombre'];
    $categoria = $_POST['categoria'];
    $precio = $_POST['precio'];

    $sql = "INSERT INTO menu (nombre, categoria, precio, id_sucursal)
            VALUES ('$nombre', '$categoria', '$precio', '$id_sucursal')";

    mysqli_query($conexion, $sql);

    header("Location: menu.php");
    exit();
}

// OBTENER MENU POR SUCURSAL
$sql = "SELECT * FROM menu WHERE id_sucursal = $id_sucursal";
$resultado = mysqli_query($conexion, $sql);
